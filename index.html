<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" >
  <meta name="viewport" content="width=device-width, initial-scale=1.0" >
  <title>Todo List Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" >
</head>
<body>
  <main class="dashboard">

    <!-- Greeting Widget -->
    <section id="greeting-widget" class="greeting-widget" aria-label="Greeting Widget">
      <div id="greeting-time" class="greeting-time" aria-live="polite">00:00:00</div>
      <div id="greeting-date" class="greeting-date"></div>
      <div id="greeting-message" class="greeting-message" aria-live="polite"></div>
    </section>

    <!-- Focus Timer -->
    <section id="focus-timer" class="focus-timer" aria-label="Focus Timer">
      <h2 class="section-title">Focus Timer</h2>
      <div id="timer-display" class="timer-display" aria-live="polite" aria-label="Timer countdown">25:00</div>
      <div class="timer-controls">
        <button id="timer-start" class="btn btn-primary" aria-label="Start timer">Start</button>
        <button id="timer-stop" class="btn btn-secondary" aria-label="Stop timer">Stop</button>
        <button id="timer-reset" class="btn btn-secondary" aria-label="Reset timer">Reset</button>
      </div>
    </section>

    <!-- Todo List -->
    <section id="todo-list" class="todo-list" aria-label="Todo List">
      <h2 class="section-title">Daftar Tugas</h2>
      <div class="task-input-group">
        <input
          type="text"
          id="task-input"
          class="task-input"
          placeholder="Tambah tugas baru..."
          aria-label="Teks tugas baru"
        />
        <button id="task-add-btn" class="btn btn-primary" aria-label="Tambah tugas">Tambah</button>
      </div>
      <ul id="task-list" class="task-list" aria-label="Daftar tugas" role="list"></ul>
    </section>

    <!-- Quick Links -->
    <section id="quick-links" class="quick-links" aria-label="Quick Links">
      <h2 class="section-title">Quick Links</h2>
      <div class="link-input-group">
        <input
          type="text"
          id="link-label-input"
          class="link-label-input"
          placeholder="Label"
          aria-label="Label link"
        />
        <input
          type="url"
          id="link-url-input"
          class="link-url-input"
          placeholder="https://..."
          aria-label="URL link"
        />
        <button id="link-add-btn" class="btn btn-primary" aria-label="Tambah link">Tambah Link</button>
      </div>
      <div id="links-container" class="links-container" aria-label="Daftar quick links"></div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
